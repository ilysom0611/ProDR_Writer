# 灾备技术方案 Tasks 配置
# 定义各个任务的描述、期望输出和执行 Agent

business_impact_analysis:
  description: >
    进行业务影响分析（BIA）：
    1. 识别客户的关键业务流程
    2. 确定每个业务的 RTO（恢复时间目标）和 RPO（恢复点目标）要求
    3. 评估业务中断对公司的财务和运营影响
    4. 确定业务恢复优先级
    5. 输出业务影响分析报告
    
    输入信息：
    - 客户行业和规模
    - 关键业务系统清单
    - 当前IT架构
    - 合规要求（如有）
  expected_output: >
    业务影响分析报告，包含：
    - 关键业务清单及优先级
    - RTO/RPO 需求矩阵
    - 业务中断影响评估（财务损失估算）
    - 恢复策略建议
  agent: requirement_analyst

current_assessment:
  description: >
    进行现状调研和评估：
    1. 梳理当前 IT 基础设施架构（服务器、存储、网络）
    2. 评估现有数据保护措施（备份、快照、复制等）
    3. 评估现有灾备能力
    4. 进行差距分析（Gap Analysis）
    5. 输出现状评估报告
    
    输入：客户提供的 IT 架构文档、现有灾备措施说明
  expected_output: >
    现状评估报告，包含：
    - 当前 IT 架构图描述
    - 现有灾备措施清单
    - 现有灾备能力评估
    - 差距分析表（与目标 RTO/RPO 对比）
    - 改进建议
  agent: requirement_analyst

disaster_recovery_design:
  description: >
    设计完整的灾备技术方案：
    1. 根据需求分析和现状评估结果，设计灾备架构
    2. 确定灾备模式（同城双活、异地灾备、3DC、云灾备等）
    3. 设计数据复制策略（同步/异步复制）
    4. 设计应用切换和回切方案
    5. 设计网络架构（网络切换、DNS 切换）
    6. 选择合适的灾备技术产品
    7. 设计演练方案
    8. 输出完整的技术方案文档
    
    确保方案满足：
    - 客户指定的 RTO/RPO 要求
    - 国家和行业相关标准
    - 预算约束
  expected_output: >
    灾备技术方案，包含：
    - 方案概述
    - 灾备架构设计（图）
    - 技术选型说明
    - 数据复制方案
    - 应用切换方案
    - 网络架构方案
    - 演练方案
    - 实施计划
  agent: dr_architect

risk_assessment:
  description: >
    进行全面的风险评估：
    1. 识别潜在风险（技术风险、运营风险、外部风险）
    2. 评估风险概率和影响
    3. 制定风险应对策略
    4. 制定详细的应急预案
    5. 输出风险评估报告
    
    参考标准：ISO 31000、GB/T 24353-2009
  expected_output: >
    风险评估报告，包含：
    - 风险清单（至少10项）
    - 风险矩阵（概率 x 影响）
    - 风险应对策略
    - 应急预案（切换流程、通知流程）
    - 演练计划
  agent: risk_consultant

investment_estimation:
  description: >
    进行项目投资估算：
    1. 制定硬件设备清单（存储、服务器、网络设备等）
    2. 估算软件许可费用（灾备软件、数据库许可等）
    3. 估算实施服务费用
    4. 估算 3 年运维费用
    5. 制定报价策略
    6. 输出完整的投资估算表
    
    参考市场价格：
    - EMC VPLEX / PowerMax
    - Huawei OceanStor
    - Zerto / Veeam / CDP
    - VMware SRM / HCX
  expected_output: >
    投资估算报告，包含：
    - 硬件设备分项报价表
    - 软件许可费用表
    - 实施服务费用表
    - 年度运维费用表（3年）
    - 项目总投资预算
    - 报价说明
  agent: cost_analyst

document_integration:
  description: >
    整合所有分析内容，生成完整的高质量灾备技术方案 Word 文档：
    
    文档结构：
    1. 封面
    2. 目录
    3. 执行摘要
    4. 项目概述
       - 项目背景
       - 建设目标
       - 建设范围
    5. 需求分析
       - 业务影响分析
       - 现状评估
       - 差距分析
    6. 灾备方案设计
       - 架构设计
       - 技术选型
       - 数据复制方案
       - 应用切换方案
       - 网络方案
    7. 实施计划
       - 实施里程碑
       - 详细实施步骤
       - 人员安排
    8. 投资估算
       - 分项报价表
       - 总投资预算
    9. 风险评估
       - 风险清单
       - 应急预案
    10. 附录
       - 公司资质证书
       - 成功案例
       - 产品介绍
    
    要求：
    - 格式规范、专业
    - 内容完整、数据准确
    - 图表清晰、美观
    - 中文字体：宋体/黑体
    - 页眉：项目名称
    - 页脚：页码
  expected_output: >
    完整的灾备技术方案 Word 文档文件
  agent: quality_reviewer
